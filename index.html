<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>workloadr.ai</title>
    <meta name="description" content="Currently Under Development" />
    <meta name="theme-color" content="#0b1220" />
    <link rel="canonical" href="https://workloadr.ai/" />
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
    <meta property="og:title" content="workloadr.ai" />
    <meta property="og:description" content="Currently Under Development" />
    <meta property="og:image" content="https://workloadr.ai/assets/og/workloadr-og-1200x630.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://workloadr.ai/" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="workloadr.ai" />
    <meta name="twitter:description" content="Currently Under Development" />
    <meta name="twitter:image" content="https://workloadr.ai/assets/og/workloadr-og-1200x630.png" />
    <style>
      :root {
        --bg: #0b1220;
        --bg-soft: #10182a;
        --text: #f5f7ff;
        --muted: #c8d0ea;
        --card: rgba(16, 24, 42, 0.78);
        --edge: rgba(125, 154, 230, 0.3);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        overflow-x: hidden;
      }

      body {
        font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
        color: var(--text);
        background:
          radial-gradient(1200px 700px at 80% -10%, rgba(125, 154, 230, 0.22), transparent 65%),
          radial-gradient(1000px 620px at 10% 115%, rgba(112, 202, 212, 0.16), transparent 65%),
          linear-gradient(180deg, var(--bg-soft) 0%, var(--bg) 100%);
      }

      main {
        min-height: 100svh;
        display: grid;
        place-items: center;
        padding: clamp(1rem, 4vw, 2rem);
      }

      .panel {
        width: min(100%, 42rem);
        padding: clamp(1.5rem, 4vw, 2.5rem);
        border: 1px solid var(--edge);
        border-radius: 1.25rem;
        background: var(--card);
        backdrop-filter: blur(8px);
        text-align: center;
      }

      .logo {
        width: clamp(4.25rem, 16vw, 7rem);
        height: auto;
        display: block;
        margin: 0 auto clamp(1.1rem, 3vw, 1.35rem);
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 5.6vw, 3.1rem);
        line-height: 1.06;
        letter-spacing: 0.015em;
        text-wrap: balance;
      }

      p {
        margin: clamp(0.7rem, 2.2vw, 1rem) 0 0;
        font-size: clamp(1rem, 2.6vw, 1.2rem);
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel" aria-label="Site status">
        <img class="logo" src="/assets/favicon.svg" width="64" height="64" alt="workloadr logo" />
        <h1>workloadr.ai</h1>
        <p>Currently Under Development</p>
      </section>
    </main>
  </body>
</html>
